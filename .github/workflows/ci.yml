name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Compile Python files
        run: python -m compileall -q backend scripts scratch
      - name: Validate ontology CSVs
        run: python scripts/tools/validate_ontology.py
      - name: Smoke-load ontology data
        run: python scripts/tools/smoke_load_data.py
      - name: Run backend tests
        run: pytest tests/backend -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Check production mock references
        run: python scripts/tools/check_no_frontend_mocks.py
      - name: Run frontend tests
        run: npm run test:run --prefix frontend
      - name: Build frontend
        run: npm run build --prefix frontend
